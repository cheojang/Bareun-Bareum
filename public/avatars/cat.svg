<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#F0F2FF"/>
  <!-- 뾰족한 귀 (고양이 특징) - 배경보다 먼저 그려서 머리 뒤에 위치 -->
  <polygon points="58,86 44,36 88,66" fill="#8888B8"/>
  <polygon points="142,86 156,36 112,66" fill="#8888B8"/>
  <!-- 귀 안쪽 -->
  <polygon points="62,82 52,50 86,70" fill="#E8C0D8"/>
  <polygon points="138,82 148,50 114,70" fill="#E8C0D8"/>
  <!-- 얼굴 -->
  <circle cx="100" cy="108" r="68" fill="#A0A0C8"/>
  <!-- 볼/얼굴 하단 밝은 영역 -->
  <ellipse cx="100" cy="124" rx="42" ry="30" fill="#C0C0E0"/>
  <!-- 눈 (아몬드형) -->
  <ellipse cx="80" cy="100" rx="12" ry="11" fill="#3A5028"/>
  <ellipse cx="120" cy="100" rx="12" ry="11" fill="#3A5028"/>
  <!-- 동공 (세로 타원) -->
  <ellipse cx="80" cy="100" rx="4.5" ry="9" fill="#1A1A2A"/>
  <ellipse cx="120" cy="100" rx="4.5" ry="9" fill="#1A1A2A"/>
  <!-- 눈 반짝이 -->
  <circle cx="84" cy="96" r="3.5" fill="white"/>
  <circle cx="124" cy="96" r="3.5" fill="white"/>
  <!-- 코 (삼각형) -->
  <polygon points="100,116 94,124 106,124" fill="#FF9BB5"/>
  <!-- 인중 + 입 -->
  <line x1="100" y1="124" x2="100" y2="128" stroke="#C07090" stroke-width="1.5"/>
  <path d="M 93 128 Q 100 135 107 128" stroke="#C07090" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 수염 -->
  <line x1="56" y1="112" x2="88" y2="118" stroke="#7070A0" stroke-width="1.5" opacity="0.65"/>
  <line x1="56" y1="120" x2="88" y2="122" stroke="#7070A0" stroke-width="1.5" opacity="0.65"/>
  <line x1="144" y1="112" x2="112" y2="118" stroke="#7070A0" stroke-width="1.5" opacity="0.65"/>
  <line x1="144" y1="120" x2="112" y2="122" stroke="#7070A0" stroke-width="1.5" opacity="0.65"/>
  <!-- 볼터치 -->
  <circle cx="68" cy="122" r="14" fill="#FFB0C8" opacity="0.32"/>
  <circle cx="132" cy="122" r="14" fill="#FFB0C8" opacity="0.32"/>
</svg>
